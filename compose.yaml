---
services:
  throttle-proxy:
    # build: .          # <- Uncomment to build the image
    image: ghcr.io/spaghetti-coder/throttle-proxy:latest
    container_name: throttle-proxy
    restart: unless-stopped
    ports:
      - 7080:8080
    environment:
      # Multiple upstreams are supported (at least 1 required)
      # - UPSTREAM=http://upstream1,https://upstream2,...
      - UPSTREAM=http://upstream
      # Port to listen on (default: 8080)
      # - PORT=8088
      # Max time in seconds a request can wait (default: 0 = disabled).
      # - MAX_WAIT=30

      # ~~ Throttle configuration ~~
      #    Conservative settings

      # Upstream fetch timeout in seconds (default: 5)
      - UPSTREAM_TIMEOUT=7

      # Delay between requests in seconds (default: 0 = no delay).
      # Supports constant or range: DELAY=5 or DELAY=0.5:2
      - DELAY=5:9

      # Gradually increase delays under sustained high-frequency requests (default 0 = disabled).
      # After escalation:
      #   DELAY_MIN = DELAY_MIN * ESCALATE_FACTOR
      #   DELAY_MAX = DELAY_MAX + DELAY_MIN - OLD_DELAY_MIN
      - ESCALATE_AFTER=3

      # Delay multiplier on each escalation step (default 1.5:2.0).
      # Supports constant or range: ESCALATE_FACTOR=1.5 or ESCALATE_FACTOR=1.5:2.0
      # - ESCALATE_FACTOR=1.5:2.0

      # Max number of delay escalation steps (default: 3, 0 = unlimited).
      # NOTE: don't go too high!
      - ESCALATE_MAX_COUNT=6

      # Endpoints to throttle, prefix-matched (default: '/' = all).
      # - ENDPOINTS=/foo,/bar/baz

      # Maximum queue size (default: 10000, min: 100, 0 = default)
      # - QUEUE_SIZE=100



