---
services:
  throttle-proxy:
    # build: .          # <- Uncomment to build the image
    image: ghcr.io/spaghetti-coder/throttle-proxy:latest
    container_name: throttle-proxy
    restart: unless-stopped
    ports:
      - 7080:8080
    environment:
      # Multiple upstreams are supported (at least 1 required)
      # - UPSTREAM=http://upstream1,https://upstream2,...
      - UPSTREAM=http://upstream1
      # Port to listen on. Default: 8080
      # - PORT=8088
      # Max time in seconds a request can wait. Default: 0 = disabled.
      # - MAX_WAIT=30

      # ~~~ Throttle configuration ~~~
      # Conservative settings for SearxNG, ends up with ~ 40 - 70 secs range

      # Upstream fetch timeout in seconds. Default: 5.
      - UPSTREAM_TIMEOUT=7

      # Delay between requests in seconds. Default: 0 = no delay.
      # Supports constant DELAY=5 or range DELAY=5.4:9.7 -> delay = rand(5.4, 9.7).
      # max < min -> max = min.
      - DELAY=5:9

      # Gradually increase delays under sustained high-frequency requests. Default 0 = disabled.
      # After escalation:
      #   factor = rend(ESCALATE_FACTOR)
      #   DELAY_MIN = DELAY_MIN * factor
      #   DELAY_MAX = DELAY_MAX * factor
      - ESCALATE_AFTER=2

      # Delay multiplier on each escalation step. Default: 1.5:2.0 -> factor = rand(1.5, 2.0).
      # Supports constant or range: ESCALATE_FACTOR=1.5 or ESCALATE_FACTOR=1.5:2.0 (i.e. min:max).
      - ESCALATE_FACTOR=1.5

      # Max number of delay escalation steps. Default: 3, 0 = unlimited.
      # NOTE: don't go too high!
      - ESCALATE_MAX_COUNT=5

      # Endpoints to throttle, prefix-matched. Default: '/' = all.
      # - ENDPOINTS=/foo,/bar/baz

      # Maximum queue size. Default: 100, min: 1, 0 = default.
      # - QUEUE_SIZE=100



